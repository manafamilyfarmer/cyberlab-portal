services:
  web:
    build: .
    image: cyberlab-portal:latest
    command: ["gunicorn", "config.wsgi:application", "-b", "0.0.0.0:8000", "--workers", "3", "--timeout", "60"]
    # Secrets are bind-mounted read-only and loaded by the entrypoint as root,
    # then the process drops to the non-root "app" user. The host files stay
    # root:root 600 and never enter the build context.
    volumes:
      - /opt/cyberlab-portal/secrets:/run/portal-secrets:ro
      # Public PVE cluster CA (NOT a secret) used to genuinely verify the
      # Proxmox API TLS cert. Read-only; the app reads it via PORTAL_PVE_CA_BUNDLE.
      - /opt/cyberlab-portal/certs:/run/portal-certs:ro
      - submissions:/var/cyberlab-submissions
    ports:
      # Bind to VM114's internal interface only — never 0.0.0.0 / public.
      - "192.168.100.92:8000:8000"
    # The PVE leaf cert has no SAN for the mgmt IP; connect by the covered name
    # proxmox.cyberlab, pinned here to the documented mgmt IP so TLS verifies.
    extra_hosts:
      - "proxmox.cyberlab:192.168.100.1"
    depends_on:
      - redis
    restart: unless-stopped

  worker:
    image: cyberlab-portal:latest
    command: ["celery", "-A", "config", "worker", "-l", "info"]
    volumes:
      - /opt/cyberlab-portal/secrets:/run/portal-secrets:ro
      - /opt/cyberlab-portal/certs:/run/portal-certs:ro
      - submissions:/var/cyberlab-submissions
    extra_hosts:
      - "proxmox.cyberlab:192.168.100.1"
    depends_on:
      - redis
      - clamav
    restart: unless-stopped

  beat:
    image: cyberlab-portal:latest
    command: ["celery", "-A", "config", "beat", "-l", "info"]
    volumes:
      - /opt/cyberlab-portal/secrets:/run/portal-secrets:ro
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    # Internal to the compose network only — NO published host port.
    restart: unless-stopped

  clamav:
    image: clamav/clamav:latest
    # Internal to the compose network only — NO published host port.
    # Fetches signatures on first start (needs egress + a few minutes).
    volumes:
      - clamav_db:/var/lib/clamav
    restart: unless-stopped

volumes:
  submissions:
  clamav_db:
